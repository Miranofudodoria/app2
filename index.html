<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>3D脱出ゲーム - 不気味な洋館</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; font-family: sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            color: white; text-align: center; pointer-events: none;
            background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; z-index: 100;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 12px; height: 12px; border: 2px solid rgba(255,255,255,0.8);
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 10;
        }
    </style>
</head>
<body>
    <div id="ui">
        <b>【不気味な洋館】</b><br>
        画面をクリックして探索開始<br>
        [W,A,S,D] 移動 / [マウス] 視点 / [クリック] 調べる
    </div>
    <div id="crosshair"></div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
        import { PointerLockControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/PointerLockControls.js';

        // --- シーン設定 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        scene.fog = new THREE.Fog(0x050505, 1, 15); // 遠くを暗闇にする

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- 操作系 (マウスで視点変更) ---
        const controls = new PointerLockControls(camera, document.body);
        const ui = document.getElementById('ui');
        
        window.addEventListener('click', () => {
            if (!controls.isLocked) {
                controls.lock();
                ui.style.display = 'none'; // プレイ中はUIを隠す
            }
        });
        controls.addEventListener('unlock', () => {
            ui.style.display = 'block';
        });

        // --- 強力な照明 (真っ暗対策) ---
        // 1. 全体を照らす光（強め）
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8); 
        scene.add(ambientLight);

        // 2.
