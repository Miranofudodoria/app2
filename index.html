<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>洋館脱出 - 懐中電灯＆インベントリ編</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'serif'; }
        /* インベントリのスタイル */
        #inventory-container {
            position: absolute; bottom: 20px; left: 20px;
            display: flex; gap: 10px; padding: 10px;
            background: rgba(0, 0, 0, 0.6); border: 2px solid #444; border-radius: 10px;
        }
        .item-slot {
            width: 60px; height: 60px; border: 1px dashed #666;
            display: flex; justify-content: center; align-items: center;
            color: #444; font-size: 0.8em; position: relative;
        }
        .item-slot.active { border: 1px solid gold; color: gold; }
        
        #crosshair { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: rgba(255,255,255,0.5); border-radius: 50%; transform: translate(-50%, -50%); }
        #msg { position: absolute; top: 20%; left: 50%; transform: translateX(-50%); color: white; text-shadow: 2px 2px 4px #000; font-size: 1.2em; pointer-events: none; opacity: 0; transition: opacity 0.5s; }
    </style>
</head>
<body>
    <div id="msg">メッセージ</div>
    <div id="crosshair"></div>
    
    <div id="inventory-container">
        <div id="slot-1" class="item-slot">空</div>
        <div id="slot-2" class="item-slot">空</div>
        <div id="slot-3" class="item-slot">空</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- ゲーム状態 ---
        let hasKey = false;

        function showMsg(text) {
            const el = document.getElementById('msg');
            el.innerText = text; el.opacity = 1;
            setTimeout(() => el.opacity = 0, 2000);
            alert(text); // 確実に伝えるために一応alertも残す
        }

        // --- シーン構築 ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x000000, 1, 12);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- 照明 (懐中電灯) ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.02)); // ほぼ真っ暗

        const flashlight = new THREE.SpotLight(0xffffff, 150, 15, Math.PI / 7, 0.3, 1);
        flashlight.castShadow = true;
        scene.add(flashlight);
        scene.add(flashlight.target);

        // --- オブジェクト配置 ---
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x222222, side: THREE.BackSide });
        const room = new THREE.Mesh(new THREE.BoxGeometry(10, 6, 10), wallMat);
        room.position.y = 3; scene.add(room);

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(10, 10), new THREE.MeshStandardMaterial({ color: 0x110500 }));
        floor.rotation.x = -Math.PI/2; floor.receiveShadow = true; scene.add(floor);

        // テーブルと鍵
        const table = new THREE.Mesh(new THREE.BoxGeometry(2, 0.8, 1), new THREE.MeshStandardMaterial({ color: 0x1a0d00 }));
        table.position.set(2, 0.4, -2); table.castShadow = true; scene.add(table);

        const key = new THREE.Mesh(new THREE.TorusGeometry(0.08, 0.02), new THREE.MeshStandardMaterial({ color: 0xffd700 }));
        key.position.set(2, 0.9, -2); key.name = "key"; scene.add(key);

        // ドア
        const door = new THREE.Mesh(new THREE.BoxGeometry(1.5, 3, 0.1), new THREE.MeshStandardMaterial({ color: 0x221100 }));
        door.position.set(0, 1.5, -4.9); door.name = "door"; scene.add(door);

        // --- 操作 ---
        const controls = new PointerLockControls(camera, document.body);
        document.body.addEventListener('click', () => controls.lock());

        const raycaster = new THREE.Raycaster();
        window.addEventListener('mousedown', () => {
            if (!controls.isLocked) return;
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const intersects = raycaster.intersectObjects(scene.children);
            
            if (intersects.length > 0) {
                const obj = intersects[0].object;
                if (obj.name === "key") {
                    hasKey = true;
                    obj.visible = false;
                    // インベントリ更新
                    const slot = document.getElementById('slot-1');
                    slot.innerText = "🔑";
                    slot.classList.add('active');
                    showMsg("「古い金鍵を手に入れた」");
                }
                if (obj.name === "door") {
                    if (hasKey) {
                        showMsg("「脱出成功！」");
                        setTimeout(() => location.reload(), 2000);
                    } else {
                        showMsg("「鍵がかかっている...」");
                    }
                }
            }
        });

        const keys = {};
        document.addEventListener('keydown', (e) => keys[e.code] = true);
        document.addEventListener('keyup', (e) => keys[e.code] = false);
        camera.position.set(0, 1.6, 3);

        function animate() {
            requestAnimationFrame(animate);
            if (controls.isLocked) {
                const speed = 0.06;
                if (keys['KeyW']) controls.moveForward(speed);
                if (keys['KeyS']) controls.moveForward(-speed);
                if (keys['KeyA']) controls.moveRight(-speed);
                if (keys['KeyD']) controls.moveRight(speed);
            }

            // 懐中電灯をカメラに追従させる（少し遅延させるとリアル）
            flashlight.position.copy(camera.position);
            const targetDir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            flashlight.target.position.copy(camera.position).add(targetDir);

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
