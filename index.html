<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>洋館脱出 - システム強化版</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: rgba(255,255,255,0.8); border-radius: 50%; transform: translate(-50%, -50%); z-index: 10; }
        
        /* インベントリUI */
        #inventory-container {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; padding: 10px; background: rgba(0, 0, 0, 0.8);
            border: 2px solid #555; border-radius: 10px;
        }
        .item-slot {
            width: 60px; height: 60px; border: 2px solid #444; border-radius: 5px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; color: #666; font-size: 1.5rem; transition: 0.2s;
        }
        .item-slot.has-item { color: #fff; border-color: #888; }
        .item-slot.selected { border-color: gold; box-shadow: 0 0 10px gold; background: rgba(255, 215, 0, 0.1); }

        #msg-log { position: absolute; top: 20%; width: 100%; text-align: center; color: white; font-size: 1.2rem; text-shadow: 2px 2px 4px #000; pointer-events: none; }
    </style>
</head>
<body>
    <div id="msg-log"></div>
    <div id="crosshair"></div>
    
    <div id="inventory-container">
        <div id="slot-0" class="item-slot" onclick="selectSlot(0)"></div>
        <div id="slot-1" class="item-slot" onclick="selectSlot(1)"></div>
        <div id="slot-2" class="item-slot" onclick="selectSlot(2)"></div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- ゲーム管理変数 ---
        let inventory = [null, null, null];
        let selectedIndex = -1;
        const REACH_DISTANCE = 2.5; // 手が届く距離

        // メッセージ表示
        function log(text) {
            const el = document.getElementById('msg-log');
            el.innerText = text;
            setTimeout(() => { if(el.innerText === text) el.innerText = ""; }, 3000);
        }

        // インベントリ選択（グローバルに公開）
        window.selectSlot = (index) => {
            if (!inventory[index]) return;
            selectedIndex = index;
            updateInventoryUI();
        };

        function updateInventoryUI() {
            inventory.forEach((item, i) => {
                const slot = document.getElementById(`slot-${i}`);
                slot.innerText = item ? item.icon : "";
                slot.className = `item-slot ${item ? 'has-item' : ''} ${selectedIndex === i ? 'selected' : ''}`;
            });
        }

        // --- Three.js セットアップ ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x000000, 1, 15);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- 改良版・懐中電灯 ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.05));
        const flashlight = new THREE.SpotLight(0xffffff, 150, 20, Math.PI / 4, 0.5, 1); // 角度を広げ、減衰を調整
        flashlight.castShadow = true;
        scene.add(flashlight);
        scene.add(flashlight.target);

        // --- ステージ作成 ---
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x333333, side: THREE.BackSide });
        const room = new THREE.Mesh(new THREE.BoxGeometry(10, 6, 10), wallMat);
        room.position.y = 3; scene.add(room);

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(10, 10), new THREE.MeshStandardMaterial({ color: 0x1a1a1a }));
        floor.rotation.x = -Math.PI/2; floor.receiveShadow = true; scene.add(floor);

        // テーブルと鍵
        const table = new THREE.Mesh(new THREE.BoxGeometry(2, 0.8, 1), new THREE.MeshStandardMaterial({ color: 0x221100 }));
        table.position.set(3, 0.4, -3); table.castShadow = true; scene.add(table);

        const key = new THREE.Mesh(new THREE.TorusGeometry(0.1, 0.03), new THREE.MeshStandardMaterial({ color: 0xffd700 }));
        key.position.set(3, 0.9, -3); key.name = "item_key"; scene.add(key);

        // ドア
        const door = new THREE.Mesh(new THREE.BoxGeometry(1.6, 3.2, 0.2), new THREE.MeshStandardMaterial({ color: 0x442211 }));
        door.position.set(0, 1.6, -4.9); door.name = "door"; scene.add(door);

        // --- インタラクション ---
        const controls = new PointerLockControls(camera, document.body);
        document.body.addEventListener('click', () => { if(!controls.isLocked) controls.lock(); });

        const raycaster = new THREE.Raycaster();
        window.addEventListener('mousedown', (e) => {
            if (!controls.isLocked) return;
            if (e.button !== 0) return; // 左クリックのみ

            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const intersects = raycaster.intersectObjects(scene.children);
            
            if (intersects.length > 0) {
                const obj = intersects[0].object;
                const dist = intersects[0].distance;

                // 距離チェック
                if (dist > REACH_DISTANCE) {
                    log("遠すぎて届かない...");
                    return;
                }

                // アイテム取得判定
                if (obj.name === "item_key") {
                    inventory[0] = { id: "key", icon: "🔑" };
                    obj.visible = false;
                    log("「古い鍵」を拾った");
                    updateInventoryUI();
                }

                // ドア判定
                if (obj.name === "door") {
                    const selectedItem = inventory[selectedIndex];
                    if (selectedItem && selectedItem.id === "key") {
                        log("脱出成功！おめでとう！");
                        setTimeout(() => location.reload(), 3000);
                    } else {
                        log("鍵がかかっている。アイテムを選択して使おう。");
                    }
                }
            }
        });

        // --- ループ ---
        const keys = {};
        document.addEventListener('keydown', (e) => keys[e.code] = true);
        document.addEventListener('keyup', (e) => keys[e.code] = false);
        camera.position.set(0, 1.6, 3);

        function animate() {
            requestAnimationFrame(animate);
            if (controls.isLocked) {
                const speed = 0.08;
                if (keys['KeyW']) controls.moveForward(speed);
                if (keys['KeyS']) controls.moveForward(-speed);
                if (keys['KeyA']) controls.moveRight(-speed);
                if (keys['KeyD']) controls.moveRight(speed);
            }
            flashlight.position.copy(camera.position);
            const targetDir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            flashlight.target.position.copy(camera.position).add(targetDir);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
