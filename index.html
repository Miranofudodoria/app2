<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Dark Manor - Trackpad Optimized</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: serif; }
        /* レティクル（照準）を少し太くして見やすく */
        #crosshair { position: absolute; top: 50%; left: 50%; width: 16px; height: 16px; border: 1px solid rgba(255,255,255,0.3); transform: translate(-50%, -50%); z-index: 10; pointer-events: none; }
        #crosshair::before { content: ''; position: absolute; top: 50%; left: 4px; width: 8px; height: 1px; background: white; }
        #crosshair::after { content: ''; position: absolute; left: 50%; top: 4px; width: 1px; height: 8px; background: white; }
        
        #inventory-container {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; padding: 12px; background: rgba(5,5,5,0.9); border: 1px solid #332211; box-shadow: 0 0 20px #000;
        }
        .item-slot {
            width: 70px; height: 70px; border: 1px solid #221105; background: #050505;
            display: flex; justify-content: center; align-items: center; position: relative;
        }
        .slot-num { position: absolute; top: 4px; left: 6px; font-size: 0.7rem; color: #443322; }
        .item-icon { font-size: 2.5rem; filter: drop-shadow(0 0 10px rgba(255,215,0,0.5)); }
        .item-slot.selected { border: 1px solid #aa8844; background: #15120a; }

        #msg-log { position: absolute; bottom: 140px; width: 100%; text-align: center; color: #aaa; font-size: 0.9rem; letter-spacing: 0.2em; pointer-events: none; }
        #guide { position: absolute; top: 20px; left: 20px; color: #666; font-size: 0.7rem; line-height: 1.8; background: rgba(0,0,0,0.5); padding: 10px; }
    </style>
</head>
<body>
    <div id="guide">WASD: 移動<br>MOUSE: 視点移動<br>Eキー: 調べる・拾う・開ける<br>1-3キー: アイテム選択</div>
    <div id="msg-log"></div>
    <div id="crosshair"></div>
    <div id="inventory-container">
        <div id="slot-0" class="item-slot"><span class="slot-num">1</span><div class="item-icon"></div></div>
        <div id="slot-1" class="item-slot"><span class="slot-num">2</span><div class="item-icon"></div></div>
        <div id="slot-2" class="item-slot"><span class="slot-num">3</span><div class="item-icon"></div></div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        let inventory = [null, null, null];
        let selectedIndex = 0;
        const collisionWalls = [];

        function log(text) {
            const el = document.getElementById('msg-log');
            el.innerText = text;
            setTimeout(() => { if(el.innerText === text) el.innerText = ""; }, 2500);
        }

        // --- 超写実テクスチャ (画像再現) ---
        function createDirtyWall() {
            const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 512;
            const c = canvas.getContext('2d');
            // 下が暗いグラデーション
            const grad = c.createLinearGradient(0, 0, 0, 512);
            grad.addColorStop(0, '#2a2a2a'); grad.addColorStop(0.7, '#1a1a1a'); grad.addColorStop(1, '#050505');
            c.fillStyle = grad; c.fillRect(0,0,512,512);
            // 汚れのシミ
            for(let i=0; i<30; i++) {
                c.fillStyle = `rgba(0,0,0,${Math.random()*0.3})`;
                c.beginPath(); c.arc(Math.random()*512, Math.random()*512, Math.random()*100, 0, Math.PI*2); c.fill();
            }
            return new THREE.CanvasTexture(canvas);
        }

        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x000000, 1, 10); // 霧を濃くして闇を深く
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // 懐中電灯（画像のような鋭い光）
        const flashlight = new THREE.SpotLight(0xffffff, 500, 18, Math.PI/5, 0.4, 1.2);
        flashlight.castShadow = true;
        scene.add(flashlight, flashlight.target, new THREE.AmbientLight(0xffffff, 0.005));

        const wallMat = new THREE.MeshStandardMaterial({ map: createDirtyWall(), roughness: 1 });
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.5, metalness: 0.2 });

        // ステージ
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(30, 40), floorMat);
        floor.rotation.x = -Math.PI/2; floor.receiveShadow = true; scene.add(floor);
        const ceil = new THREE.Mesh(new THREE.PlaneGeometry(30, 40), wallMat);
        ceil.position.y = 4; ceil.rotation.x = Math.PI/2; scene.add(ceil);

        function addWall(w, h, d, x, y, z) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallMat);
            m.position.set(x, y, z); scene.add(m); collisionWalls.push(m);
        }
        addWall(10, 4, 0.5, 0, 2, 5); 
        addWall(0.5, 4, 10, -5, 2, 0); 
        addWall(0.5, 4, 10, 5, 2, 0); 
        addWall(4.2, 4, 0.5, -3, 2, -5); 
        addWall(4.2, 4, 0.5, 3, 2, -5);
        addWall(10, 4, 15, 0, 2, -12.5);

        // 枠
        const frame = new THREE.Mesh(new THREE.BoxGeometry(1.8, 3, 0.6), new THREE.MeshStandardMaterial({color:0x0a0a0a}));
        frame.position.set(0, 1.5, -5); scene.add(frame);

        // ドア
        const door = new THREE.Mesh(new THREE.BoxGeometry(1.5, 2.9, 0.1), new THREE.MeshStandardMaterial({color: 0x150d05}));
        door.position.set(0, 1.45, -4.95); door.name = "obj_door"; scene.add(door);

        // 金庫
        const safe = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 0.7), new THREE.MeshStandardMaterial({color: 0x080808}));
        safe.position.set(-3, 0.35, -10); safe.name = "obj_safe"; scene.add(safe);
        collisionWalls.push(safe);
        const key = new THREE.Mesh(new THREE.TorusGeometry(0.08, 0.02), new THREE.MeshStandardMaterial({color: 0xffaa00, emissive: 0x332200}));
        key.position.set(-3, 0.8, -10); key.name = "obj_key"; key.visible = false; scene.add(key);

        // 操作
        const controls = new PointerLockControls(camera, document.body);
        document.body.addEventListener('click', () => controls.lock());

        // アクション実行関数
        function performAction() {
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(scene.children);
            if (hits.length > 0) {
                const obj = hits[0].object;
                if (hits[0].distance > 2.5) return;

                if (obj.name === "obj_door") {
                    obj.position.x = (obj.position.x === 0) ? 1.4 : 0;
                    log(obj.position.x === 0 ? "Door closed." : "Door opened.");
                }
                if (obj.name === "obj_safe" && !key.visible) {
                    const code = prompt("Enter Code:");
                    if(code === "1234") { key.visible = true; log("Unlocked."); }
                }
                if (obj.name === "obj_key") {
                    inventory[0] = { id: "key", icon: "🔑" };
                    obj.visible = false; log("Key acquired."); updateUI();
                }
            }
        }

        function updateUI() {
            inventory.forEach((item, i) => {
                const slot = document.getElementById(`slot-${i}`);
                slot.querySelector('.item-icon').innerText = item ? item.icon : "";
                slot.className = `item-slot ${selectedIndex === i ? 'selected' : ''}`;
            });
        }

        const keys = {};
        window.onkeydown = (e) => {
            keys[e.code] = true;
            if (e.code === 'KeyE') performAction(); // Eキーでアクション
            if (['Digit1','Digit2','Digit3'].includes(e.code)) {
                selectedIndex = parseInt(e.code.replace('Digit','')) - 1; updateUI();
            }
        };
        window.onkeyup = (e) => keys[e.code] = false;

        camera.position.set(0, 1.6, 3);
        updateUI();

        const wallRay = new THREE.Raycaster();
        function animate() {
            requestAnimationFrame(animate);
            if (controls.isLocked) {
                const move = new THREE.Vector3();
                if (keys['KeyW']) move.z -= 1; if (keys['KeyS']) move.z += 1;
                if (keys['KeyA']) move.x -= 1; if (keys['KeyD']) move.x += 1;
                if (move.length() > 0) {
                    move.normalize();
                    const mDir = new THREE.Vector3(); camera.getWorldDirection(mDir); mDir.y = 0; mDir.normalize();
                    const sDir = new THREE.Vector3().crossVectors(camera.up, mDir);
                    const final = new THREE.Vector3().addScaledVector(mDir, -move.z).addScaledVector(sDir, -move.x).normalize();
                    
                    wallRay.set(camera.position, final);
                    const hit = wallRay.intersectObjects(collisionWalls);
                    if (hit.length === 0 || hit[0].distance > 0.5) {
                        camera.position.addScaledVector(final, 0.07);
                    }
                }
            }
            flashlight.position.copy(camera.position);
            const target = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
            flashlight.target.position.copy(camera.position).add(target);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
