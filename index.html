<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>3D脱出ゲーム - 不気味な洋館</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            color: white; text-align: center; pointer-events: none;
            text-shadow: 2px 2px 4px #000;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 10px; height: 10px; border: 1px solid rgba(255,255,255,0.5);
            border-radius: 50%; transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div id="ui">WASDで移動 / クリックで調べる</div>
    <div id="crosshair"></div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        // --- 設定 ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x111111, 0.15); // 霧で奥を見えなくする

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // 影を有効化
        document.body.appendChild(renderer.domElement);

        // --- 部屋の作成 ---
        // 床
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(20, 20),
            new THREE.MeshStandardMaterial({ color: 0x221100 }) // 暗い木目調のつもり
        );
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // 壁（大きな箱の内側）
        const room = new THREE.Mesh(
            new THREE.BoxGeometry(10, 6, 10),
            new THREE.MeshStandardMaterial({ color: 0x333333, side: THREE.BackSide })
        );
        room.position.y = 3;
        room.receiveShadow = true;
        scene.add(room);

        // --- オブジェクト（仮のドアや机） ---
        // 出口のドア（赤い板）
        const door = new THREE.Mesh(
            new THREE.BoxGeometry(1.5, 3, 0.2),
            new THREE.MeshStandardMaterial({ color: 0x442200 })
        );
        door.position.set(0, 1.5, -4.9);
        door.name = "door"; // 名前をつけて判別しやすくする
        scene.add(door);

        // 謎の箱（クリック対象）
        const box = new THREE.Mesh(
            new THREE.BoxGeometry(0.5, 0.5, 0.5),
            new THREE.MeshStandardMaterial({ color: 0x880000 })
        );
        box.position.set(2, 0.25, -2);
        box.castShadow = true;
        box.name = "mysteryBox";
        scene.add(box);

        // --- 照明 ---
        const ambientLight = new THREE.AmbientLight(0x404040, 0.3);
        scene.add(ambientLight);

        const spotLight = new THREE.SpotLight(0xffffff, 50);
        spotLight.position.set(0, 5, 0);
        spotLight.angle = Math.PI / 4;
        spotLight.penumbra = 0.3;
        spotLight.castShadow = true;
        scene.add(spotLight);

        // --- インタラクション (Raycaster) ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2(0, 0); // 画面中央

        window.addEventListener('click', () => {
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children);

            if (intersects.length > 0) {
                const obj = intersects[0].object;
                if (obj.name === "door") {
                    alert("ドアは鍵がかかっている...");
                } else if (obj.name === "mysteryBox") {
                    alert("古い箱の中に『錆びた鍵』を見つけた！");
                    obj.visible = false; // アイテムゲットで消す
                }
            }
        });

        // --- 移動操作 ---
        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

        camera.position.set(0, 1.6, 3);

        function updateMovement() {
            const speed = 0.05;
            if (keys['w']) camera.position.z -= speed;
            if (keys['s']) camera.position.z += speed;
            if (keys['a']) camera.position.x -= speed;
            if (keys['d']) camera.position.x += speed;
            
            // 部屋の範囲制限（簡易壁判定）
            camera.position.x = Math.max(-4.5, Math.min(4.5, camera.position.x));
            camera.position.z = Math.max(-4.5, Math.min(4.5, camera.position.z));
        }

        // --- ループ ---
        function animate() {
            requestAnimationFrame(animate);
            updateMovement();
            renderer.render(scene, camera);
        }
        animate();

        // リサイズ対応
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
