<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>3D脱出ゲーム - 視界確保版</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: white; }
        #instructions {
            position: absolute; top: 10px; left: 10px;
            background: rgba(255,255,255,0.8); padding: 10px; z-index: 10;
        }
    </style>
</head>
<body>
    <div id="instructions">
        <b>【画面が見えない場合の対策版】</b><br>
        1. 画面をクリックして操作開始<br>
        2. WASDで移動、マウスで視点移動<br>
        ※これで真っ暗ならブラウザがWebGL非対応の可能性があります。
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
        import { PointerLockControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/PointerLockControls.js';

        const scene = new THREE.Scene();
        // 背景をあえて「明るいグレー」にします（真っ暗回避）
        scene.background = new THREE.Color(0x888888); 

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        // 露出設定を無効化して、色がそのまま出るようにする
        renderer.toneMapping = THREE.NoToneMapping; 
        document.body.appendChild(renderer.domElement);

        const controls = new PointerLockControls(camera, document.body);
        window.addEventListener('click', () => controls.lock());

        // --- 強制的に明るくするライト ---
        // 全方位から照らす最強の光
        const ambient = new THREE.AmbientLight(0xffffff, 3.0); 
        scene.add(ambient);

        // 上から照らす太陽のような光
        const sun = new THREE.DirectionalLight(0xffffff, 2.0);
        sun.position.set(5, 10, 5);
        scene.add(sun);

        // --- 部屋の作成 ---
        // 床（明るい緑）
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(20, 20),
            new THREE.MeshStandardMaterial({ color: 0x00ff00 }) 
        );
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // 壁（明るい白に近い色）
        const wallMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, side: THREE.BackSide });
        const room = new THREE.Mesh(new THREE.BoxGeometry(10, 6, 10), wallMat);
        room.position.y = 3;
        scene.add(room);

        // ドア（赤い柱）
        const door = new THREE.Mesh(
            new THREE.BoxGeometry(1, 3, 1),
            new THREE.MeshStandardMaterial({ color: 0xff0000 })
        );
        door.position.set(0, 1.5, -4);
        scene.add(door);

        // --- 初期位置（部屋の真ん中） ---
        camera.position.set(0, 1.6, 0); 

        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function animate() {
            requestAnimationFrame(animate);
            if (controls.isLocked) {
                const speed = 0.1;
                if (keys['KeyW']) controls.moveForward(speed);
                if (keys['KeyS']) controls.moveForward(-speed);
                if (keys['KeyA']) controls.moveRight(-speed);
                if (keys['KeyD']) controls.moveRight(speed);
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
