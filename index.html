<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>洋館脱出ゲーム - 再構築版</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #gui { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.5); padding: 10px; font-family: sans-serif; pointer-events: none; }
    </style>
</head>
<body>
    <div id="gui">移動: WASD または 矢印キー<br>視点: マウス移動</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- 1. 基本設定 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111); // 暗い背景
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- 2. 照明 (ここが大事！) ---
        const ambient = new THREE.AmbientLight(0xffffff, 1.0); // 全体を明るく
        scene.add(ambient);

        const spot = new THREE.PointLight(0xffaa00, 50); // 暖炉のような暖かい光
        spot.position.set(0, 3, 0);
        scene.add(spot);

        // --- 3. 部屋を作る ---
        // 床
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(20, 20),
            new THREE.MeshStandardMaterial({ color: 0x443322 }) // 茶色の床
        );
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // 壁（箱を作る）
        const room = new THREE.Mesh(
            new THREE.BoxGeometry(10, 6, 10),
            new THREE.MeshStandardMaterial({ color: 0x555555, side: THREE.BackSide })
        );
        room.position.y = 3;
        scene.add(room);

        // 出口のドア（赤い板）
        const door = new THREE.Mesh(
            new THREE.BoxGeometry(1.5, 3, 0.2),
            new THREE.MeshStandardMaterial({ color: 0x880000 })
        );
        door.position.set(0, 1.5, -4.9);
        scene.add(door);

        // --- 4. 操作設定 ---
        const controls = new PointerLockControls(camera, document.body);
        
        // 画面クリックで操作開始
        document.body.addEventListener('click', () => {
            controls.lock();
        });

        const keys = {};
        document.addEventListener('keydown', (e) => keys[e.code] = true);
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        camera.position.set(0, 1.6, 3); // 人の高さにセット

        // --- 5. ループ処理 ---
        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked) {
                const speed = 0.1;
                if (keys['KeyW'] || keys['ArrowUp']) controls.moveForward(speed);
                if (keys['KeyS'] || keys['ArrowDown']) controls.moveForward(-speed);
                if (keys['KeyA'] || keys['ArrowLeft']) controls.moveRight(-speed);
                if (keys['KeyD'] || keys['ArrowRight']) controls.moveRight(speed);
            }

            renderer.render(scene, camera);
        }
        animate();

        // 画面サイズ変更対応
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
